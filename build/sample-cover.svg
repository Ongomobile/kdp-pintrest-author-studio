  <text x="300" y="120" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="10" fill="#F4E6C1">A NOVEL</text>
  <text x="300" y="195" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#FDF6E3">THE MIDNIGHT</text>
  <text x="300" y="265" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#FDF6E3">LIGHTHOUSE</text>
  <rect x="230" y="292" width="140" height="3" fill="#FFD97A"/>
  <text x="300" y="856" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="6" fill="#FDF6E3">ELENA MARSH</text>
