    <rect x="276" y="352" width="48" height="30" rx="4" fill="#2B2118"/>
    <rect x="284" y="356" width="32" height="20" fill="#FFD97A"/>
    <path d="M284 366 L120 320 L120 412 Z" fill="#FFD97A" opacity="0.28"/>
    <path d="M316 366 L520 330 L520 402 Z" fill="#FFD97A" opacity="0.28"/>
    <path d="M272 352 h56 l-8 -18 h-40 Z" fill="#3A2C1E"/>
